<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition
        xmlns="http://www.w3.org/1999/xhtml"
        xmlns:h="http://xmlns.jcp.org/jsf/html"
        xmlns:f="http://xmlns.jcp.org/jsf/core"
        xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
        xmlns:p="http://primefaces.org/ui"
        template="template/template.xhtml">
    <ui:define name="body">
        <f:metadata>
            <f:event type="preRenderView" listener="#{userController.loadUsers()}"/>
        </f:metadata>

        <p:card title="User Management" styleClass="mb-3"
                subtitle="Manage users in the system. You can add, edit, and delete users.">


            <h:form id="userForm">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1em;">
                    <p:commandButton value="Add User" icon="pi pi-plus" styleClass="mb-2 ui-button-success"
                                     onclick="PF('userDialog').show(); return false;"
                                     actionListener="#{userController.prepareNewUser()}"
                                     update=":userDialogForm"/>
                </div>
                <p:dataTable id="userTable" var="user" value="#{userController.users}"
                             paginator="true" rows="10" responsiveLayout="scroll" stripedRows="true"
                             rowKey="#{user.id}" selectionMode="single" selection="#{userController.selectedUser}">
                    <p:column headerText="Id">
                        <h:outputText value="#{user.id}"/>
                    </p:column>
                    <p:column headerText="Name">
                        <h:outputText value="#{user.name}"/>
                    </p:column>
                    <p:column headerText="Email">
                        <h:outputText value="#{user.email}"/>
                    </p:column>
                    <p:column headerText="Username">
                        <h:outputText value="#{user.username}"/>
                    </p:column>
                    <p:column headerText="Actions" style="width:120px;">
                        <p:commandButton icon="pi pi-pencil" title="Edit"
                                         actionListener="#{userController.editUser(user)}"
                                         update=":userDialogForm"
                                         oncomplete="PF('userDialog').show();"
                                         process="@this"/>
                        <p:spacer width="5"/>
                        <p:commandButton icon="pi pi-trash" title="Delete"
                                         actionListener="#{userController.deleteUser(user.id)}"
                                         update="userTable"
                                         styleClass="ui-button-danger"
                                         process="@this">
                            <p:confirm header="Confirmation" message="Are you sure you want to delete this user?"/>
                        </p:commandButton>
                    </p:column>
                </p:dataTable>
            </h:form>
        </p:card>

        <p:dialog id="userDialog" widgetVar="userDialog" header="User" modal="true" closable="true" resizable="false"
                  draggable="true" width="400">
            <h:form id="userDialogForm">
                <h:panelGrid columns="2" cellpadding="5">
                    <h:outputLabel for="name" value="Name:"/>
                    <p:inputText id="name" value="#{userController.selectedUser.name}" required="true"/>

                    <h:outputLabel for="email" value="Email:"/>
                    <p:inputText id="email" value="#{userController.selectedUser.email}" required="true"/>

                    <h:outputLabel for="username" value="Username:"/>
                    <p:inputText id="username" value="#{userController.selectedUser.username}" required="true"/>

                    <h:outputLabel for="password" value="Password:"/>
                    <p:password id="password" value="#{userController.selectedUser.password}"
                                required="#{userController.selectedUser.id == null}"/>
                </h:panelGrid>
                <hr/>
                <h:panelGrid columns="2">
                    <p:commandButton value="Save" actionListener="#{userController.saveUser()}"
                                     update=":userForm:userTable"
                                     oncomplete="PF('userDialog').hide();"
                                     process="@form"/>
                    <p:commandButton value="Cancel" onclick="PF('userDialog').hide(); return false;" type="button"/>
                </h:panelGrid>
            </h:form>
        </p:dialog>
    </ui:define>
</ui:composition>
