<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui">
<f:view>
    <h:head>
        <title>Login</title>
        <style>
            body {
                background: #f4f4f4;
            }

            .login-panel {
                width: 350px;
                margin: 100px auto;
            }
        </style>
    </h:head>
    <h:body>
        <div class="login-panel">
            <p:panel header="Sign In" style="text-align:center;">
                <h:form>
                    <p:messages id="msgs" showDetail="true" autoUpdate="true"/>
                    <p:inputText id="username" value="#{loginController.username}" placeholder="Username"
                                 required="true" style="width:100%;margin-bottom:1em;"/>
                    <p:password id="password" value="#{loginController.password}" placeholder="Password" required="true"
                                style="width:100%;margin-bottom:1em;"/>
                    <p:commandButton value="Login" action="#{loginController.login}" update="msgs" style="width:100%;"/>
                </h:form>
            </p:panel>
        </div>
    </h:body>
</f:view>
</html>
