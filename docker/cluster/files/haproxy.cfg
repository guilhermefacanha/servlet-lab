global
    log stdout format raw local0 info # Log to stdout for Docker logs
    maxconn 2000 # Max concurrent connections

defaults
    mode http # HAProxy operates at the HTTP layer
    timeout connect 5000ms # Max time to connect to a backend server
    timeout client 50000ms # Max time for client to remain inactive
    timeout server 50000ms # Max time for server to remain inactive
    option httplog # Enable HTTP request logging

listen http_front
    bind *:80 # HAProxy will listen on port 80

    # Define the backend servers (your Wildfly instances)
    # The 'cookie JSESSIONID prefix' directive is key for sticky sessions.
    # It tells HAProxy to use the JSESSIONID cookie for stickiness and to
    # expect the Wildfly instance's JvmRoute (or route ID) as a prefix.
    # The 'check' directive enables health checks.
    cookie JSESSIONID prefix

    # IMPORTANT: The 'node1', 'node2', 'node3' values MUST match the
    # jboss.route system property you set for each Wildfly instance.

    server wildfly1 wildfly1:8080 check inter 1000 cookie node1 #'node1' is the jvmRoute
    server wildfly2 wildfly2:8080 check inter 1000 cookie node2 #'node2' is the jvmRoute
    server wildfly3 wildfly3:8080 check inter 1000 cookie node3 #'node3' is the jvmRoute
